trigger:
- dev

pool:
  name: 'Azure Pipelines'
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: |
    npm install
    npm run build
  displayName: 'npm install and build'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'dist'        
    ArtifactName: 'drop'         
    publishLocation: 'Container'
  displayName: 'Publish dist folder as build artifact'  
